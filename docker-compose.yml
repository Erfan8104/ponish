services:
  postgres:
    image: postgres:16

    container_name: ponisha_db

    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ponisha

    ports:
      - "5435:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
